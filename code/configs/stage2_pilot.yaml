# Stage-2 pilot config — view-shift latent grounding on MindCube
#
# Targets the real architecture from latent_spatial_reasoning_implementation_plan.md
# but with simplifications appropriate for a pilot:
#   - MindCube as a stand-in for ScanQA/SQA3D (multi-view spatial reasoning, no 3D pose)
#   - View-index positional encoding stands in for full 6-DoF PoseEnc
#   - Qwen2.5-VL-7B-Instruct backbone (cached locally)
#   - SigLIP-base as the frozen 2D vision target encoder
#
run_name: stage2_pilot_mindcube_v0
output_root: /mnt/data3/haoming_x_spatial_scratch/latent_reasoning_runs

model:
  backbone_id: Qwen/Qwen2.5-VL-7B-Instruct
  backbone_dtype: bfloat16
  siglip_path: /mnt/data3/haoming_x_spatial_scratch/latent_reasoning_runs/hf_cache/siglip-base-patch16-224
  view_idx_pose_dim: 64        # placeholder for PoseEnc; learned positional embedding over view index
  max_views_per_sample: 4
  freeze_backbone: false       # full SFT during stage 2 (per plan)
  freeze_vision_tower: true    # Qwen's own ViT stays frozen
  lora:
    enabled: true              # required to fit on 80GB H100 PCIe with DDP
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

data:
  mindcube_root: /home/haoming/mindcube_data
  train_jsonl: /home/haoming/mindcube_data/raw/MindCube_train.jsonl
  eval_jsonl: /home/haoming/mindcube_data/raw/MindCube_tinybench.jsonl
  num_workers: 4
  prefetch_factor: 2

train:
  num_train_steps: 1500        # initial pilot; extend if curves are healthy
  micro_batch_size: 1          # per-device
  grad_accum_steps: 4          # effective batch = 1 * 3 GPUs * 4 = 12
  lr_backbone: 2.0e-5
  lr_heads: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 80
  cosine_schedule: true
  loss_lambda_latent: 1.0
  loss_lambda_text: 1.0
  loss_lambda_format: 0.5
  infonce_start_step: 1500
  infonce_max_weight: 0.3
  precision: bf16
  gradient_checkpointing: true

ckpt:
  save_every_n_steps: 250
  keep_last_n: 2
  save_optimizer_state: true   # required for resume

eval:
  eval_every_n_steps: 500
  eval_max_samples: 64

log:
  log_every_n_steps: 10
  use_wandb: false             # set true if WANDB_API_KEY present
  wandb_project: latent_reasoning
